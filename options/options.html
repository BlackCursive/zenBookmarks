<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Zen Bookmarks Settings</title>
  <style>
    @font-face {
      font-family: 'JetBrains Mono';
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      src: url('../fonts/JetBrainsMono-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'JetBrains Mono';
      font-weight: 700;
      font-style: normal;
      font-display: swap;
      src: url('../fonts/JetBrainsMono-Bold.woff2') format('woff2');
    }
    :root {
      color-scheme: light dark;
      --zb-text-normal: light-dark(#1c1c1c, #e6e6e6);
      --zb-text-muted: light-dark(#555, #a0a8c0);
      --zb-text-success: light-dark(#2d7a3e, #9ece6a);
      --zb-bg-primary: light-dark(#fafafa, #111);
      --zb-bg-surface: light-dark(#fff, #1a1a1a);
      --zb-bg-hover: light-dark(rgba(0, 0, 0, 0.05), rgba(255, 255, 255, 0.06));
      --zb-border: light-dark(rgba(0, 0, 0, 0.15), rgba(255, 255, 255, 0.15));
      --zb-border-strong: light-dark(rgba(0, 0, 0, 0.35), rgba(255, 255, 255, 0.3));
      --zb-accent: var(--color-accent-primary, AccentColor);
    }
    * { border-radius: 0 !important; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: var(--zb-bg-primary);
      color: var(--zb-text-normal);
      padding: 32px;
      max-width: 520px;
      margin: 0;
    }
    h1 { font-size: 20px; margin: 0 0 24px; font-weight: 600; letter-spacing: 0.01em; }
    h2 {
      font-size: 11.5px;
      color: var(--zb-text-muted);
      margin: 28px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      border-bottom: 1.5px solid var(--zb-border);
      padding-bottom: 6px;
    }
    p { font-size: 13px; color: var(--zb-text-muted); margin: 0 0 12px; line-height: 1.5; }
    .shortcut-value {
      display: inline-block;
      background: var(--zb-bg-surface);
      border: 1.5px solid var(--zb-border);
      padding: 4px 10px;
      font-size: 13px;
      font-family: ui-monospace, Menlo, monospace;
      color: var(--zb-text-normal);
    }
    a { color: var(--zb-accent); font-size: 13px; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button {
      background: transparent;
      border: 1.5px solid var(--zb-border);
      color: var(--zb-text-normal);
      cursor: pointer;
      font-size: 13px;
      padding: 7px 16px;
      margin-right: 8px;
      font-family: inherit;
      font-weight: 500;
      transition: border-color 0.1s, scale 0.1s;
    }
    button:hover { background: var(--zb-bg-hover); border-color: var(--zb-border-strong); }
    button:active { scale: 0.98; }
    #status { font-size: 12px; color: var(--zb-text-success); margin-top: 12px; min-height: 18px; }
  </style>
</head>
<body>
  <h1>Zen Bookmarks</h1>

  <h2>Keyboard Shortcut</h2>
  <p>Current shortcut: <span class="shortcut-value" id="shortcut">Loading…</span></p>
  <p><a href="about:addons" id="addons-link">Change in Add-ons Manager →</a></p>

  <h2>Data</h2>
  <p>Colors and custom icons are stored separately from your browser bookmarks.</p>
  <button id="export-btn">Export as Markdown</button>
  <button id="reset-btn">Reset all colors &amp; icons</button>
  <div id="status"></div>

  <script type="module" src="../dist/options.js"></script>
</body>
</html>
